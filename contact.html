<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Contact Us</title>
</head>
<body>
<!-- Navbar --><nav class="bg-blue-600 p-4 text-white flex items-center">

  <!-- LEFT: LOGO -->
  <h1 class="font-bold">Care Hospital</h1>

  <!-- MIDDLE: LINKS -->
  <div class="space-x-4 ml-10">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="doctors.html">Doctors</a>
    <a href="appointment.html">Appointment</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- RIGHT: ACCOUNT -->
  <div class="relative ml-auto">

    <!-- ICON -->
    <button id="accountIcon" class="text-2xl">
      👤
    </button>

    <!-- DROPDOWN -->
    <div id="accountMenu"
         class="hidden absolute right-0 mt-2 w-40 bg-white text-black shadow-lg rounded-lg z-50">

      <button id="loginOption"
        class="block w-full text-left px-4 py-2 hover:bg-gray-100">
        Login
      </button>

      <button id="logoutOption"
        class="block w-full text-left px-4 py-2 hover:bg-gray-100">
        Logout
      </button>

    </div>

  </div>

</nav>

<!-- Contact Section -->
<section class="p-10">

  <h2 class="text-3xl font-bold text-center mb-8">Contact Us</h2>

  <div class="grid md:grid-cols-2 gap-10">

    <!-- Contact Info -->
    <div class="space-y-4">
      <h3 class="text-xl font-bold">Get in Touch</h3>
      <p class="text-gray-600">We are here to help you 24/7.</p>

      <p><strong>📞 Phone:</strong> +254 712 345 678</p>
      <p><strong>📧 Email:</strong> info@carehospital.com</p>
      <p><strong>📍 Location:</strong> Nairobi, Kenya</p>

      <div class="bg-blue-100 p-4 rounded-xl">
        <p class="font-bold text-blue-700">🚑 Emergency Available 24/7</p>
      </div>
    </div>

    <!-- Contact Form -->
    <form class="bg-white p-6 rounded-2xl shadow space-y-4">
      <input type="text" placeholder="Your Name" class="w-full p-3 border rounded-lg">
      <input type="email" placeholder="Your Email" class="w-full p-3 border rounded-lg">
      <textarea placeholder="Your Message" class="w-full p-3 border rounded-lg h-32"></textarea>

      <button class="bg-blue-600 text-white w-full py-3 rounded-lg hover:bg-blue-700 transition">
        Send Message
      </button>
    </form>

  </div>

</section>

<!-- Footer -->
<footer class="bg-blue-600 text-white text-center p-4 mt-10">
  <p>© 2026 Care Hospital. All rights reserved.</p>
</footer>

</body>
</html>
